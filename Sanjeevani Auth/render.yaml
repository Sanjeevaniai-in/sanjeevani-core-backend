services:
  - type: web
    name: sanjeevani-auth
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_WORKERS
        value: 2
      - key: MONGO_DB_NAME
        value: sanjeevani_auth
      - key: SUPPORTED_APPS
        value: dashboard,storefront,ops_hub
      - key: DEFAULT_SUBSCRIPTION_PLAN
        value: free
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_DASHBOARD
        sync: false
      - key: FRONTEND_STOREFRONT
        sync: false
      - key: FRONTEND_OPS_HUB
        sync: false
